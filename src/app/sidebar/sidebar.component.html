<div class="colorful-sidebar">
  <div class="sidebar-header">
    <div class="logo-container">
      <ion-icon name="speedometer" class="logo-icon"></ion-icon>
    </div>
    <div class="title-container">
      <h2>Dashboard Details</h2>
      <p>Get Your Dashboard Details</p>
    </div>
  </div>

  <div class="sidebar-content">
    <div class="menu-section">
      <h3 class="section-title">Settings</h3>
      <ion-list lines="none" class="transparent-list">
        @for (p of SideBarMenu; track p) {
        <ion-menu-toggle auto-hide="false">
          <ion-item routerDirection="root" class="menu-item" detail="false" (click)="chooseOption(p)">
            <div class="icon-box" [ngClass]="p.ColorClass" slot="start">
              <ion-icon [name]="p.Icon"></ion-icon>
            </div>
            <ion-label>{{ p.Title }}</ion-label>
          </ion-item>
        </ion-menu-toggle>
        }
      </ion-list>
    </div>
